<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swim Game - Juega con tu Rostro</title>
  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <!-- ml5.js -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <style>
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background-color: #1a1a2e; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    canvas { 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      border-radius: 15px;
      max-height: 95vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
<script>
// ==========================================
// Shaders integrados
// ==========================================
const vertCode = `
  attribute vec3 aPosition;
  attribute vec2 aTexCoord;
  varying vec2 vTexCoord;
  void main() {
    vTexCoord = aTexCoord;
    vec4 positionVec4 = vec4(aPosition, 1.0);
    positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
    gl_Position = positionVec4;
  }
`;

const fragCode = `
  #ifdef GL_ES
  precision mediump float;
  #endif

  uniform float u_time;
  uniform vec2 u_resolution;

  void main() {
      vec2 st = gl_FragCoord.xy / u_resolution.xy;
      st.y -= u_time * 0.4;
      
      float wave1 = sin(st.x * 12.0 + u_time * 1.5) * 0.02;
      float wave2 = sin(st.y * 20.0 - u_time * 2.0) * 0.015;
      st.x += wave1;
      st.y += wave2;
      
      vec3 colorProfundo = vec3(0.39, 0.59, 0.86);
      vec3 colorClaro = vec3(0.5, 0.75, 0.95);
      vec3 colorBrillo = vec3(0.7, 0.9, 1.0);
      
      float pattern = sin(st.x * 30.0) * cos(st.y * 30.0);
      pattern = smoothstep(0.0, 0.5, pattern);
      
      vec3 finalColor = mix(colorProfundo, colorClaro, pattern * 0.6);
      
      float sparkle = sin(st.x * 50.0 + u_time) * cos(st.y * 50.0 - u_time);
      if (sparkle > 0.95) {
          finalColor = mix(finalColor, colorBrillo, 0.8);
      }

      gl_FragColor = vec4(finalColor, 1.0);
  }
`;

// ==========================================
// Variables del juego
// ==========================================
const ESTADO_CARGANDO = 0;
const ESTADO_CALIBRANDO = 1;
const ESTADO_JUGANDO = 2;
const ESTADO_TERMINADO = 3;
let estadoActual = ESTADO_CARGANDO;

let video;
let faceMesh; 
let faces = [];

let jugadorX = 250;
let targetJugadorX = 250;
let jugadorY = 600;

let puntaje = 0;
let burbujas = [];
let velocidadFondo = 3.0;
let offsetFondo = 0;

let waterShader;
let shaderLayer;
let tiempoInicio;
let tiempoJuego = 60; // 60 segundos

function setup() {
  createCanvas(500, 800);
  
  shaderLayer = createGraphics(500, 800, WEBGL);
  shaderLayer.noStroke();
  waterShader = shaderLayer.createShader(vertCode, fragCode);

  video = createCapture(VIDEO);
  video.size(640, 480);
  video.hide(); 

  faceMesh = ml5.faceMesh(video, { maxFaces: 1 }, modelReady);
  
  textAlign(CENTER, CENTER);
}

function modelReady() {
  console.log("¡Modelo Facial IA cargado!");
  faceMesh.detectStart(video, gotFaces);
  estadoActual = ESTADO_CALIBRANDO; 
}

function gotFaces(results) {
  faces = results;
  if (faces.length > 0) {
    let nariz = faces[0].keypoints[1]; 
    targetJugadorX = map(nariz.x, 0, 640, width, 0);
  }
}

function draw() {
  if (estadoActual === ESTADO_CARGANDO) {
    dibujarPantallaCarga();
  } 
  else if (estadoActual === ESTADO_CALIBRANDO) {
    dibujarPantallaCalibracion();
  } 
  else if (estadoActual === ESTADO_JUGANDO) {
    dibujarJuego();
  } 
  else if (estadoActual === ESTADO_TERMINADO) {
    mostrarPantallaFinal();
  }
}

// ==========================================
// Funciones
// ==========================================

// Función para dibujar la mini cámara en la esquina con el punto verde 
function dibujarMiniCamara() {
  push();
  translate(width - 10, height - 10);
  scale(-1, 1); 
  image(video, 0, -90, 120, 90);
  noFill();
  stroke(255, 100);
  strokeWeight(2);
  rect(0, -90, 120, 90, 5);
  pop();
  
  if (faces.length > 0) {
      let nariz = faces[0].keypoints[1];

      let dotX = map(nariz.x, 0, 640, width - 10, width - 130);
      let dotY = map(nariz.y, 0, 480, height - 100, height - 10);
      
      fill(0, 255, 0);
      noStroke();
      circle(dotX, dotY, 8);
  }
}

// ==========================================
// Estados
// ==========================================

function dibujarPantallaCarga() {
  background(30, 60, 100);
  fill(255);
  textSize(30);
  text("Cargando la IA Facial...\nPermite tu cámara", width/2, height/2 - 50);
  
  push();
  translate(width/2, height/2 + 50);
  rotate(frameCount * 0.1);
  stroke(255);
  strokeWeight(4);
  noFill();
  arc(0, 0, 40, 40, 0, PI + HALF_PI);
  pop();
}

function dibujarPantallaCalibracion() {
  targetJugadorX = constrain(targetJugadorX, 60, width - 60);
  jugadorX = lerp(jugadorX, targetJugadorX, 0.15);

  background(40, 80, 140);
  
  fill(255, 255, 255, 30);
  noStroke();
  rect(0, 0, 120, height); 
  rect(width - 120, 0, 120, height); 

  fill(255);
  textSize(35);
  text("¡Cámara lista!", width/2, height/3 - 50);
  
  textSize(25);
  fill(200, 255, 200);
  text("Mueve tu cabeza hacia\nun LADO para empezar", width/2, height/3 + 20);

  textSize(40);
  text("←", 60, height/2);
  text("→", width - 60, height/2);

  dibujarPersonaje(jugadorX, jugadorY);
  dibujarMiniCamara(); // Agregada la mini cámara aquí para ayudar a calibrar (comentar para ocultar)

  if (jugadorX < 120 || jugadorX > width - 120) {
    estadoActual = ESTADO_JUGANDO;
    tiempoInicio = millis(); 
  }
}

function dibujarJuego() {
  let tiempoTranscurrido = floor((millis() - tiempoInicio) / 1000);
  let tiempoRestante = tiempoJuego - tiempoTranscurrido;

  if (tiempoRestante <= 0) {
    estadoActual = ESTADO_TERMINADO;
    return;
  }

  // 1. DIBUJAR FONDO SHADER
  shaderLayer.shader(waterShader);
  waterShader.setUniform("u_time", millis() / 1000.0);
  waterShader.setUniform("u_resolution", [width, height]);
  shaderLayer.rect(-width/2, -height/2, width, height); 
  image(shaderLayer, 0, 0);

  // 2. DIBUJAR BORDES LATERALES
  offsetFondo += velocidadFondo;
  if (offsetFondo > 60) offsetFondo = 0;
  
  noStroke();
  for (let i = -1; i <= height/60 + 1; i++) {
    let yPos = i * 60 + offsetFondo;
    fill(255); rect(10, yPos, 30, 50, 10);
    fill(150, 200, 255); rect(15, yPos + 5, 20, 40, 5);
    
    fill(255); rect(width - 40, yPos, 30, 50, 10);
    fill(150, 200, 255); rect(width - 35, yPos + 5, 20, 40, 5);
  }

  // 3. ACTUALIZAR JUGADOR
  targetJugadorX = constrain(targetJugadorX, 60, width - 60);
  jugadorX = lerp(jugadorX, targetJugadorX, 0.15);

  // 4. BURBUJAS
  if (frameCount % 40 === 0) {
    burbujas.push(new Burbuja(random(80, width - 80), -50));
  }

  for (let i = burbujas.length - 1; i >= 0; i--) {
    let b = burbujas[i];
    b.actualizar();
    b.dibujar();
    
    let distancia = dist(jugadorX, jugadorY, b.x, b.y);
    if (distancia < 40) {
      puntaje += 1;
      burbujas.splice(i, 1);
    } else if (b.y > height + 50) {
      burbujas.splice(i, 1);
    }
  }

  // 5. DIBUJAR JUGADOR
  dibujarPersonaje(jugadorX, jugadorY);

  // 6. UI
  fill(255);
  textSize(40);
  text("Swim, swim", width/2, 80);
  textSize(60);
  text(nf(puntaje, 2), width/2, 140);
  textSize(30);
  text("Tiempo: " + nf(tiempoRestante, 2), width/2, 200);

  // 7. MINI CAMARA
  dibujarMiniCamara();
}

function mostrarPantallaFinal() {
  background(30, 60, 100);
  fill(255);
  textSize(50);
  text("¡TIEMPO AGOTADO!", width/2, height/2 - 50);
  textSize(40);
  text("Puntaje: " + puntaje, width/2, height/2 + 30);
  
  textSize(20);
  fill(200, 220, 255);
  text("Refresca la página para volver a jugar", width/2, height/2 + 100);
}

// ==========================================
// Clases y dibujos secundarios
// ==========================================

function dibujarPersonaje(px, py) {
  push();
  translate(px, py);
  
  fill(255, 150);
  noStroke();
  circle(0, 40 + random(-5, 5), 10);
  circle(0, 55 + random(-5, 5), 6);
  circle(0, 70 + random(-5, 5), 4);
  
  stroke(0);
  strokeWeight(3);
  
  fill(255, 204, 0); 
  let anguloBrazo = sin(frameCount * 0.1) * 0.5;
  
  push(); translate(-15, 0); rotate(anguloBrazo); rect(-15, -5, 20, 10, 5); pop();
  push(); translate(15, 0); rotate(-anguloBrazo); rect(-5, -5, 20, 10, 5); pop();
  
  let desplazamientoPierna = sin(frameCount * 0.15) * 6;
  push(); translate(-8, 15 + desplazamientoPierna); rect(-5, 0, 10, 15, 4); pop();
  push(); translate(8, 15 - desplazamientoPierna); rect(-5, 0, 10, 15, 4); pop();
  
  fill(255, 50, 50); rect(-15, -15, 30, 35, 8);
  fill(255, 204, 0); circle(0, -25, 35);
  
  fill(255); arc(0, -25, 35, 35, PI, TWO_PI, CHORD);
  fill(255, 50, 50); arc(0, -25, 15, 35, PI, TWO_PI, CHORD);
  
  pop();
}

class Burbuja {
  constructor(xInicial, yInicial) {
    this.x = xInicial;
    this.y = yInicial;
    this.velocidad = random(4.0, 6.0);
    this.tamano = random(30, 45);
  }
  actualizar() {
    this.y += this.velocidad;
    this.x += sin(this.y * 0.05) * 1.5; 
  }
  dibujar() {
    stroke(255, 200); strokeWeight(2); fill(150, 200, 255, 100);
    circle(this.x, this.y, this.tamano);
    noStroke(); fill(255, 200);
    circle(this.x - this.tamano/4, this.y - this.tamano/4, this.tamano/4);
  }
}
</script>
</body>
</html>
